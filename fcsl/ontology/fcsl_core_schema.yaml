relation_families:
  R_AG:
    requests:
      domain: Agent
      range: Goal
      description: agent requests a goal or information need
    pursues:
      domain: Agent
      range: Goal
      description: agent is associated with a goal
    owns:
      domain: Agent
      range: Goal
      description: agent owns a goal
    delegates:
      domain: Agent
      range: Agent
      description: agent delegates a goal or action to another agent
    constrains:
      domain: [Agent, Context]
      range: Goal
      description: agent/context constraints affect a goal

  R_GO:
    requires:
      domain: Goal
      range: Requirement
      description: goal induces an information requirement
    relevantTo:
      domain: Observation
      range: Goal
      description: observation is relevant to a goal
    supports:
      domain: [Observation, Belief]
      range: Goal
      description: observation or belief supports a goal
    contradicts:
      domain: [Observation, Belief]
      range: Goal
      description: observation or belief contradicts a goal
    satisfies:
      domain: Observation
      range: Requirement
      description: observation satisfies an information requirement

  R_OC:
    observedBy:
      domain: Observation
      range: EnvironmentEntity
      description: observation is generated by a source
    observedAt:
      domain: Observation
      range: Context
      description: observation is associated with a time context
    occursIn:
      domain: Observation
      range: Context
      description: observation occurs in a context
    validUnder:
      domain: Observation
      range: Context
      description: observation is valid under contextual conditions
    hasReliability:
      domain: Observation
      range: EnvironmentEntity
      description: observation has a reliability descriptor

  R_B:
    believes:
      domain: Agent
      range: Belief
      description: agent or assistant holds a belief
    derivedFrom:
      domain: Belief
      range: Observation
      description: belief is derived from observation evidence
    updates:
      domain: Belief
      range: Belief
      description: belief updates another belief
    invalidates:
      domain: Belief
      range: Belief
      description: belief invalidates another belief
    conflictsWith:
      domain: Primitive
      range: Primitive
      description: two primitives/statements are in conflict

  R_AM:
    enables:
      domain: Belief
      range: Action
      description: belief enables an action
    recommends:
      domain: Action
      range: Agent
      description: action is recommended to an agent
    actsOn:
      domain: Action
      range: EnvironmentEntity
      description: action targets an environment entity
    notifies:
      domain: Action
      range: Agent
      description: action notifies an agent
    mitigates:
      domain: Action
      range: EnvironmentEntity
      description: action mitigates a risk or environmental state

  R_X:
    locatedIn:
      domain: Primitive
      range: [Context, EnvironmentEntity]
      description: primitive has a spatial/contextual location
    near:
      domain: Primitive
      range: EnvironmentEntity
      description: primitive is near an environment entity
    during:
      domain: Primitive
      range: Context
      description: primitive is temporally associated with a context
    affectedBy:
      domain: Primitive
      range: [Context, EnvironmentEntity]
      description: primitive is affected by context or environment
    underCondition:
      domain: Primitive
      range: Context
      description: primitive is interpreted under contextual conditions
