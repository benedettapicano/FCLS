agents:
  coast_guard_operator:
    label: Coast guard operator
    type: coast_guard_operator
    location: coastal_area_A
    capabilities: [authorize_swimming, issue_warning, request_sampling, coordinate_rescue]
    preferences:
      safety_first: true
      false_negative_cost: high
    privacy:
      access_level: operational
  environmental_authority:
    label: Environmental authority
    type: environmental_authority
    location: coastal_area_A
    capabilities: [monitor_pollution, enforce_bathing_water_rules]
    preferences:
      pollution_compliance: high
    privacy:
      access_level: authority
  tourist:
    label: Tourist
    type: tourist
    location: coastal_area_A
    capabilities: [receive_recommendation]
    preferences:
      personalized_advice: true
    privacy:
      access_level: public

goals:
  assess_swimming_safety:
    label: Assess swimming safety
    description: Is it safe to authorize swimming activities in this coastal area?
    priority: high
    requirements: [water_quality, weather, wave, current, crowd, pollution]
    admissible_actions: [authorize_swimming, restrict_swimming, notify_warning, request_additional_sampling]
    query_patterns: [safe to authorize swimming, swimming safety, safe to swim, authorize swimming]
    event_patterns: [sudden_pollution_increase, storm_warning, rip_current_alert]
    constraints:
      false_negative_cost: high
  assess_pollution_event:
    label: Assess pollution event
    description: Is there an environmentally relevant pollution event?
    priority: high
    requirements: [water_quality, pollution]
    admissible_actions: [notify_environmental_authority, request_additional_sampling]
    query_patterns: [pollution event, water pollution, bathing water quality]
    event_patterns: [sudden_pollution_increase]

contexts:
  coastal_safety_regulation:
    label: Coastal safety regulation context
    location: coastal_area_A
    environment:
      area_type: coastal_bathing_area
      season: summer
      regulation: bathing_safety
    user:
      role: coast_guard_operator
    operation:
      decision_type: swimming_authorization
      latency_requirement: low

requirements:
  water_quality:
    label: Water quality
    category: environmental_safety
    description: microbiological and chemical water quality for bathing
    priority: high
    labels: [ecoli_level, enterococci_level, turbidity, ph, dissolved_oxygen]
  weather:
    label: Weather
    category: meteorological_safety
    description: weather conditions relevant to bathing safety
    priority: high
    labels: [wind_speed, storm_risk, rainfall]
  wave:
    label: Wave conditions
    category: marine_safety
    description: wave height and sea state
    priority: high
    labels: [wave_height, wave_period, sea_state]
  current:
    label: Currents
    category: marine_safety
    description: current speed and rip-current risk
    priority: high
    labels: [current_speed, rip_current_risk]
  crowd:
    label: Human presence
    category: operational_safety
    description: beach and swimmer crowding information
    priority: normal
    labels: [crowd_density, swimmer_presence]
  pollution:
    label: Pollution evidence
    category: environmental_safety
    description: visible or reported pollution evidence
    priority: high
    labels: [oil_slick, algal_bloom, debris_presence]
  mobility:
    label: Mobility information
    category: non_swimming_context
    description: road or parking information not directly required for swimming safety
    priority: low
    labels: [parking_availability, road_traffic_density]
  infrastructure:
    label: Infrastructure status
    category: non_swimming_context
    description: edge/cloud infrastructure indicators
    priority: low
    labels: [edge_cpu_load, network_latency]

sources:
  buoy_1:
    label: Smart buoy 1
    type: buoy
    modalities: [water_quality, hydrological, marine]
    reliability_range: [0.82, 0.98]
    location: coastal_area_A
  uav_1:
    label: UAV 1
    type: uav
    modalities: [visual, thermal, marine]
    reliability_range: [0.70, 0.94]
    location: coastal_area_A
  camera_1:
    label: Coastal surveillance camera
    type: camera
    modalities: [visual]
    reliability_range: [0.65, 0.90]
    location: coastal_area_A
  weather_station_1:
    label: Weather station
    type: weather_station
    modalities: [meteorological]
    reliability_range: [0.78, 0.97]
    location: coastal_area_A
  environmental_db:
    label: Environmental historical database
    type: environmental_database
    modalities: [historical_record, water_quality]
    reliability_range: [0.55, 0.88]
    location: coastal_area_A
  edge_monitor:
    label: Edge infrastructure monitor
    type: edge_monitor
    modalities: [infrastructure]
    reliability_range: [0.90, 0.99]
    location: coastal_area_A
  mobility_service:
    label: Mobility information service
    type: external_service
    modalities: [mobility]
    reliability_range: [0.55, 0.85]
    location: coastal_area_A

environment_entities:
  coastal_area_A:
    label: Coastal area A
    type: coastal_area
    location: coastal_area_A
    attributes:
      has_bathing_zone: true
      has_lifeguard: true
    tau: [0.0, 24.0]
  bathing_zone_A:
    label: Bathing zone A
    type: bathing_zone
    location: coastal_area_A
    attributes:
      managed_by: coast_guard_operator
    tau: [0.0, 24.0]

