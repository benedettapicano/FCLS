actions:
  authorize_swimming:
    label: Authorize swimming
    type: recommendation
    target: coast_guard_operator
    decision_state: safe
    preconditions: [belief_swimming_safe]
    effects: [swimming_authorized]
    priority: normal
  restrict_swimming:
    label: Restrict swimming
    type: recommendation
    target: coast_guard_operator
    decision_state: unsafe
    preconditions: [belief_swimming_unsafe]
    effects: [swimming_restricted]
    priority: high
  notify_warning:
    label: Notify warning
    type: notification
    target: coast_guard_operator
    decision_state: unsafe
    preconditions: [belief_swimming_unsafe]
    effects: [warning_issued]
    priority: high
  request_additional_sampling:
    label: Request additional sampling
    type: recommendation
    target: coast_guard_operator
    decision_state: uncertain
    preconditions: [belief_uncertain]
    effects: [additional_observations_requested]
    priority: normal
  notify_environmental_authority:
    label: Notify environmental authority
    type: notification
    target: environmental_authority
    decision_state: unsafe
    preconditions: [pollution_event_detected]
    effects: [authority_notified]
    priority: high

event_triggers:
  sudden_pollution_increase:
    event_type: sudden_pollution_increase
    activates_goal: assess_swimming_safety
    condition:
      semantic_label: ecoli_level
      risk_level: high
  storm_warning:
    event_type: storm_warning
    activates_goal: assess_swimming_safety
    condition:
      semantic_label: storm_risk
      risk_level: high
  rip_current_alert:
    event_type: rip_current_alert
    activates_goal: assess_swimming_safety
    condition:
      semantic_label: rip_current_risk
      risk_level: critical

decision_rules:
  actions_by_state:
    safe: [authorize_swimming]
    unsafe: [restrict_swimming, notify_warning]
    uncertain: [request_additional_sampling]
